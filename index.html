<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trinethra — Supervisor Feedback Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 22px; }
    header span { font-size: 13px; opacity: 0.6; }

    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }

    .card h2 { font-size: 16px; margin-bottom: 12px; color: #444; }

    textarea {
      width: 100%;
      height: 180px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
      color: #333;
    }

    textarea:focus { outline: none; border-color: #4f46e5; }

    button.analyze-btn {
      margin-top: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
    }

    button.analyze-btn:hover { background: #4338ca; }
    button.analyze-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .finding-card {
      background: white;
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #4f46e5;
    }

    .finding-card.accepted { border-left-color: #10b981; }
    .finding-card.rejected { border-left-color: #ef4444; opacity: 0.5; }

    .finding-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .finding-title { font-size: 16px; font-weight: 600; }

    .score-badge {
      background: #eef2ff;
      color: #4f46e5;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
    }

    .finding-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      margin-top: 10px;
      margin-bottom: 3px;
    }

    .finding-text { font-size: 14px; color: #333; line-height: 1.5; }

    .finding-text.editable {
      border: 1px dashed #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      min-height: 36px;
      outline: none;
    }

    .finding-text.editable:focus { border-color: #4f46e5; }

    .action-buttons { display: flex; gap: 10px; margin-top: 16px; }

    .btn {
      padding: 7px 18px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-accept { background: #d1fae5; color: #065f46; }
    .btn-accept:hover { background: #a7f3d0; }
    .btn-edit { background: #e0e7ff; color: #3730a3; }
    .btn-edit:hover { background: #c7d2fe; }
    .btn-reject { background: #fee2e2; color: #991b1b; }
    .btn-reject:hover { background: #fecaca; }

    .status-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 10px;
    }

    .tag-accepted { background: #d1fae5; color: #065f46; }
    .tag-rejected { background: #fee2e2; color: #991b1b; }
    .tag-editing { background: #fef3c7; color: #92400e; }

    #loading {
      text-align: center;
      padding: 40px;
      font-size: 15px;
      color: #6b7280;
      display: none;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #results-section { display: none; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .results-header h2 { font-size: 18px; font-weight: 700; }

    .export-btn {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .export-btn:hover { background: #2d2d4e; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>👁️ Trinethra</h1>
    <span>Supervisor Feedback Analyzer </span>
  </div>
</header>

<div class="container">

  <div class="card">
    <h2>Paste Supervisor Transcript</h2>
    <textarea id="transcript" placeholder="Paste the full supervisor feedback transcript here..."></textarea>
    <button class="analyze-btn" onclick="analyzeTranscript()">🔍 Analyze Transcript</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Analyzing transcript with AI... this may take 20–40 seconds
  </div>

  <div id="results-section">
    <div class="results-header">
      <h2>AI-Generated Findings — Review Each One</h2>
      <button class="export-btn" onclick="exportReport()">⬇️ Export Report</button>
    </div>
    <div id="findings-container"></div>
  </div>

</div>

<script>
  let findings = [];

  async function analyzeTranscript() {
    const transcript = document.getElementById('transcript').value.trim();
    if (!transcript) { alert('Please paste a transcript first.'); return; }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('results-section').style.display = 'none';
    document.querySelector('.analyze-btn').disabled = true;

    try {
      const response = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript })
      });

      const data = await response.json();
      findings = data.findings.map(f => ({ ...f, status: 'pending' }));
      renderFindings();
    } catch (err) {
      alert('Something went wrong. Make sure Ollama is running.');
      console.error(err);
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.querySelector('.analyze-btn').disabled = false;
    }
  }

  function renderFindings() {
    const container = document.getElementById('findings-container');
    container.innerHTML = '';

    findings.forEach((f, i) => {
      const statusTag = f.status === 'accepted'
        ? '<span class="status-tag tag-accepted">✓ Accepted</span>'
        : f.status === 'rejected'
        ? '<span class="status-tag tag-rejected">✗ Rejected</span>'
        : f.status === 'editing'
        ? '<span class="status-tag tag-editing">✏ Editing</span>'
        : '';

      container.innerHTML += `
        <div class="finding-card ${f.status}" id="card-${i}">
          <div class="finding-header">
            <div>
              <span class="finding-title">${f.title}</span>
              ${statusTag}
            </div>
            <span class="score-badge">Score: ${f.score}/10</span>
          </div>

          <div class="finding-label">Observation</div>
          <div class="finding-text editable" contenteditable="true" id="obs-${i}"
               onblur="saveEdit(${i}, 'observation', this.innerText)">${f.observation}</div>

          <div class="finding-label">Gap / Suggestion</div>
          <div class="finding-text editable" contenteditable="true" id="gap-${i}"
               onblur="saveEdit(${i}, 'gap', this.innerText)">${f.gap}</div>

          <div class="action-buttons">
            <button class="btn btn-accept" onclick="setStatus(${i}, 'accepted')">✓ Accept</button>
            <button class="btn btn-edit" onclick="setStatus(${i}, 'editing')">✏ Edit</button>
            <button class="btn btn-reject" onclick="setStatus(${i}, 'rejected')">✗ Reject</button>
          </div>
        </div>
      `;
    });

    document.getElementById('results-section').style.display = 'block';
  }

  function setStatus(i, status) {
    findings[i].status = status;
    renderFindings();
  }

  function saveEdit(i, field, value) {
    findings[i][field] = value;
  }

  function exportReport() {
    const accepted = findings.filter(f => f.status !== 'rejected');
    let report = 'TRINETHRA — SUPERVISOR FEEDBACK ANALYSIS REPORT\n';
    report += '='.repeat(50) + '\n\n';

    accepted.forEach((f, i) => {
      report += `Finding ${i + 1}: ${f.title}\n`;
      report += `Status: ${f.status.toUpperCase()}\n`;
      report += `Score: ${f.score}/10\n`;
      report += `Observation: ${f.observation}\n`;
      report += `Gap/Suggestion: ${f.gap}\n`;
      report += '-'.repeat(40) + '\n\n';
    });

    const blob = new Blob([report], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'trinethra_report.txt';
    a.click();
  }
</script>

</body>
</html>
